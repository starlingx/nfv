# Tox (http://tox.testrun.org/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.
[tox]
envlist = pep8,pylint,black,py39,cover
minversion = 4.4.0
skipsdist = True
toxworkdir = /tmp/{env:USER}_nfvtox

[nfv]
nfv_base_dir = .
nfv_client_dir = ./nfv-client
nfv_common_dir = ./nfv-common
nfv_plugins_dir = ./nfv-plugins
nfv_vim_dir = ./nfv-vim
nfv_test_dir = ./nfv-tests
stx_fault_dir = ../../fault
stx_tsconfig_dir = ../../config/tsconfig/tsconfig
stx_software_dir = ../../update/software
stx_utilities_dir = ../../utilities/utilities/platform-util/platform-util

nfv_client_src_dir = {[nfv]nfv_client_dir}/nfv_client
nfv_common_src_dir = {[nfv]nfv_common_dir}/nfv_common
nfv_plugins_src_dir = {[nfv]nfv_plugins_dir}/nfv_plugins
nfv_vim_src_dir = {[nfv]nfv_vim_dir}/nfv_vim
nfv_test_src_dir = {[nfv]nfv_test_dir}

[testenv]
basepython = python3.9
sitepackages = False
deps =
    -c{env:UPPER_CONSTRAINTS_FILE:https://opendev.org/starlingx/root/raw/branch/master/build-tools/requirements/debian/upper-constraints.txt}
    -r{toxinidir}/test-requirements.txt
    -e{[nfv]nfv_client_dir}
    -e{[nfv]nfv_common_dir}
    -e{[nfv]nfv_plugins_dir}
    -e{[nfv]nfv_vim_dir}
    -e{[nfv]stx_fault_dir}/fm-api/source
    -e{[nfv]stx_tsconfig_dir}
    -e{[nfv]stx_software_dir}
    -e{[nfv]stx_utilities_dir}
    iso8601
    keyring
    kombu
    kubernetes
    oslo.log
    passlib
    pecan
    pyparsing
    PyYAML
    sqlalchemy
    stevedore
    wsme

[nosetests]
verbosity=2

[flake8]
# - hacking codes -
# H104: File contains nothing but comments
# H404: multi line docstring should start without a leading new line
# H405: multi line docstring summary not separated with an empty line
# H501: Do not use self.__dict__ for string formatting
# warnings
# W503 line break before binary operator
# W504  line break after binary operator
# W605 invalid escape sequence
# errors
# E121 continuation line under-indented for hanging indent
# E122 continuation line missing indentation or outdented
# E124 closing bracket does not match visual indentation
# E126 continuation line over-indented for hanging indent
# E127 continuation line over-indented for visual indent
# E128 continuation line under-indented for visual indent
# E129 visually indented line with same indent as next logical line
ignore = H104,H404,H405,H501,
         W503,W504,W605,
         E121,E122,E124,E126,E127,E128,E129
# H106 Don’t put vim configuration in source files (off by default).
# H203 Use assertIs(Not)None to check for None (off by default).
# TODO: enable: H904 Delay string interpolations at logging calls (off by default).
enable-extensions = H106,H203
# rather than suppress E501 line too long, set max line length and reduce later
max-line-length = 185

# TODO(rlima): enable these rules once the code formatting is updated
# show-source = True
# max-line-length = 88
# Suppressed flake8 codes
# E203 whitespace before ':'; conflict with Black
# H301 one import per line; conflict with Black
# W503 line break before binary operator; conflict with Black
# W504 line break after binary operator
# ignore = E203,H301,W503,W504
# builtins = _


[testenv:pep8]
commands =
    flake8 {[nfv]nfv_base_dir}

[testenv:pylint]
deps = {[testenv]deps}
       {[nfv]nfv_test_dir}/nfv_unit_tests
       {[nfv]nfv_test_dir}/nfv_scenario_tests
       jinja2
commands = pylint {[nfv]nfv_client_src_dir}  \
                  {[nfv]nfv_common_src_dir}  \
                  {[nfv]nfv_plugins_src_dir} \
                  {[nfv]nfv_vim_src_dir}     \
                  {[nfv]nfv_test_src_dir}/nfv_unit_tests     \
                  --rcfile=./.pylintrc

[testenv:black]
# This environment checks and displays the recommended changes by Black for formatting
# Python files.
# To apply the format in a specific file, use the following command: black {posargs} .
deps =
   black>=23.11.0 # MIT
commands =
   black --check --diff .

[testenv:py39]
deps = {[testenv]deps}
       coverage
       fixtures
       stestr
       testtools
commands =
    cp -v {[nfv]nfv_base_dir}/nfv-tests/nfv_unit_tests/test_data/nfv_vim_db_stx_25.09 {envdir}/
    stestr --test-path={[nfv]nfv_base_dir}/nfv-tests/nfv_unit_tests/tests run '{posargs}'
    stestr slowest
allowlist_externals =
    cp
    stestr

[testenv:cover]
deps =
    {[testenv]deps}
    coverage
    fixtures
    stestr
    testtools
setenv =
    PYTHON=coverage run --parallel-mode
commands =
    cp -v {[nfv]nfv_base_dir}/nfv-tests/nfv_unit_tests/test_data/nfv_vim_db_stx_25.09 {envdir}/
    coverage erase
    stestr --test-path={[nfv]nfv_base_dir}/nfv-tests/nfv_unit_tests/tests run '{posargs}'
    coverage combine
    coverage html -d cover
    coverage xml -o cover/coverage.xml
    coverage report --fail-under=24
allowlist_externals =
    cp
    stestr

[bandit]
# These are the bandit codes that are failing for nfv
# B104: hardcoded_bind_all_interfaces
# B108: Probable insecure usage of temp file/directory
# B110: Try, Except, Pass detected.
# B310: Audit url open for permitted schemes
skips = B104,B108,B110,B310
exclude = ./nfv-docs,./nfv-tests,./nfv-debug-tools,unit_test

[testenv:bandit]
deps = bandit
commands = bandit --ini tox.ini -f txt -r {[nfv]nfv_base_dir}